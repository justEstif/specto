<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8940a"/>
      <stop offset="100%" stop-color="#a06f08"/>
    </linearGradient>
  </defs>
  <!-- Background: warm near-black rounded square -->
  <rect width="32" height="32" rx="6" fill="#1c1a17"/>
  <!-- Aperture / lens mark: six overlapping arc blades forming a camera-iris shape -->
  <g transform="translate(16,16)" fill="none" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round">
    <!-- Top blade -->
    <path d="M0,-10 A10,10 0 0,1 8.66,-5"/>
    <!-- Top-right blade -->
    <path d="M8.66,-5 A10,10 0 0,1 8.66,5"/>
    <!-- Bottom-right blade -->
    <path d="M8.66,5 A10,10 0 0,1 0,10"/>
    <!-- Bottom blade -->
    <path d="M0,10 A10,10 0 0,1 -8.66,5"/>
    <!-- Bottom-left blade -->
    <path d="M-8.66,5 A10,10 0 0,1 -8.66,-5"/>
    <!-- Top-left blade -->
    <path d="M-8.66,-5 A10,10 0 0,1 0,-10"/>
    <!-- Inner iris blades — connecting lines through center for the aperture look -->
    <line x1="0" y1="-10" x2="8.66" y2="5" opacity="0.5"/>
    <line x1="8.66" y1="-5" x2="0" y2="10" opacity="0.5"/>
    <line x1="8.66" y1="5" x2="-8.66" y2="5" opacity="0.5"/>
    <line x1="0" y1="10" x2="-8.66" y2="-5" opacity="0.5"/>
    <line x1="-8.66" y1="5" x2="0" y2="-10" opacity="0.5"/>
    <line x1="-8.66" y1="-5" x2="8.66" y2="-5" opacity="0.5"/>
  </g>
  <!-- Center dot — the lens focal point -->
  <circle cx="16" cy="16" r="2.5" fill="url(#g)"/>
</svg>
